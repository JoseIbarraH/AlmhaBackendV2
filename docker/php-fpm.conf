; Override the default PHP-FPM pool so it listens on a Unix socket instead
; of TCP :9000 — that port is now used by nginx externally.
; Loaded after www.conf (alphabetical order in /usr/local/etc/php-fpm.d/).

[www]
listen = /run/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660
