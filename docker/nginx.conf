server {
    listen 9000 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Security: hide nginx version
    server_tokens off;

    # Real client IP behind Dokploy's Traefik reverse proxy
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # Hardening: drop dotfiles except the Laravel-public .well-known path
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Static assets — let nginx serve them directly
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|webp|ico|woff2?|ttf|eot)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP handoff. PHP-FPM is moved to :9001 since nginx owns :9000.
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9001;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 60s;
    }

    # Generous body size for image uploads (blog/procedure media)
    client_max_body_size 20M;

    # Gzip — Traefik also compresses, but enabling here helps when Dokploy
    # routes internal traffic without the Traefik gzip middleware.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;
}
